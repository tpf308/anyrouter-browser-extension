<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <title>AnyRouter Quota</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body class="tone-idle">
    <!-- 访问凭据设置弹窗 -->
    <div class="modal" id="keyModal" hidden>
      <div class="modal-card">
        <div class="modal-header">
          <p class="modal-heading">设置访问凭据</p>
          <a class="modal-link" href="https://anyrouter.top/console/personal" target="_blank" rel="noopener">
            去控制台获取
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
              <polyline points="15 3 21 3 21 9"/>
              <line x1="10" y1="14" x2="21" y2="3"/>
            </svg>
          </a>
        </div>
        <form id="configForm">
          <label class="field">
            <span class="field-label">API Key</span>
            <input
              id="apiKeyInput"
              name="apiKey"
              type="password"
              placeholder="控制台令牌 sk-xxx（查余额 + AI 检测共用）"
              autocomplete="off"
              spellcheck="false"
            />
          </label>
          <div class="modal-actions">
            <button type="button" id="cancelKeyBtn" class="btn-ghost">取消</button>
            <button type="submit" class="btn-fill">保存</button>
          </div>
        </form>
      </div>
    </div>

    <main class="panel">
      <!-- 顶栏 -->
      <header class="topbar">
        <div class="status-group">
          <span class="dot" id="statusDot"></span>
          <span class="status-text" id="statusLabel">未配置</span>
          <span class="status-note" id="statusNote" hidden></span>
        </div>
        <div class="toolbar">
          <label class="switch" id="autoRefreshField" title="自动刷新：开启后每 5 分钟自动探测一次；关闭后仅在点刷新按钮时探测">
            <span class="switch-label">自动</span>
            <input type="checkbox" id="autoRefreshToggle" class="switch-input" checked />
            <span class="switch-track"><span class="switch-thumb"></span></span>
          </label>
          <button class="icon-btn" id="refreshButton" type="button" title="刷新额度">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M20 6v5h-5"/><path d="M4 18v-5h5"/>
              <path d="M18.2 9A7 7 0 0 0 6.5 6.2L4 8.6"/>
              <path d="M5.8 15A7 7 0 0 0 17.5 17.8L20 15.4"/>
            </svg>
          </button>
          <button class="icon-btn icon-btn-accent" id="openKeyBtn" type="button" title="设置访问凭据">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="7.5" cy="15.5" r="5.5"/>
              <path d="M21 2l-9.6 9.6"/>
              <path d="M15.5 7.5l3 3L22 7l-3-3"/>
            </svg>
          </button>
        </div>
      </header>

      <!-- 提示 -->
      <div class="alert" id="alertBox" hidden></div>

      <!-- 数据视图：只保留 AI 检测卡片，余额展示在工具栏图标上 -->
      <section id="summaryView" hidden>
        <!-- AI 健康状态卡片：逐条展示各线路（主站 / 大陆直连），由 popup.js 动态填充 -->
        <div class="health" id="healthCard">
          <div class="health-targets" id="healthTargets"></div>
          <!-- 探测方式：native=本地 host（准确）/ fetch=浏览器（可能假 429），由 popup.js 填充 -->
          <div class="probe-via" id="probeVia" hidden></div>
        </div>
      </section>

      <!-- 空状态 -->
      <section class="empty" id="emptyState">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="7.5" cy="15.5" r="5.5"/>
          <path d="M21 2l-9.6 9.6"/>
          <path d="M15.5 7.5l3 3L22 7l-3-3"/>
        </svg>
        <p>点击右上角钥匙按钮<br>填写 API Key<br>即可显示余额并检测 AI</p>
      </section>
    </main>

    <script src="usage.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
